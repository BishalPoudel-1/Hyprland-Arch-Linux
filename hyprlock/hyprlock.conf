# -----------------------------
# BACKGROUND (BLUR SCREEN)
# -----------------------------
background {
    monitor =
    path = screenshot

    blur_passes = 3
    blur_size = 6

    brightness = 0.85
}

# -----------------------------
# TIME
# -----------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 180
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, 180
    halign = center
    valign = center
}

# -----------------------------
# DATE
# -----------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%B %d %Y")"
    color = rgba(200, 200, 200, 0.8)
    font_size = 40
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, 20
    halign = center
    valign = center
}

# -----------------------------
# DAY
# -----------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A")"
    color = rgba(180, 180, 180, 0.7)
    font_size = 36
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -50
    halign = center
    valign = center
}

# -----------------------------
# GENERAL
# -----------------------------
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# -----------------------------
# GREETING
# -----------------------------
label {
    monitor =
    text = cmd[update:60000] echo "Good $(date +%H | awk '{if ($1 < 10) print "morning"; else if ($1 < 13) print "noon"; else if ($1 < 18) print "afternoon"; else if ($1 < 22) print "evening"; else print "night"}')"
    color = rgba(220, 220, 220, 0.8)
    font_size = 28
    font_family = JetBrains Mono Nerd Font Mono
    position = 0, 340
    halign = center
    valign = center
}

# -----------------------------
# INPUT FIELD
# -----------------------------
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3

    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(212, 131, 203, 0.9)   # similar to your old purple
    inner_color = rgba(104, 116, 206, 0.6)   # soft blue/purple inside
    font_color = rgba(255, 255, 255, 0.9)

    fade_on_empty = true
    fade_timeout = 1000

    placeholder_text = <i>  Logged in as </i>$USER
    hide_input = false

    rounding = -1

    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300

    capslock_color = 1
    numlock_color = 1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = true

    position = 0, -130
    halign = center
    valign = center
}
