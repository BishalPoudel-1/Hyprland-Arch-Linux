# -----------------------------
# BACKGROUND (BLUR SCREEN)
# -----------------------------
background {
    monitor =
    path = screenshot

    blur_passes = 3
    blur_size = 6

    brightness = 0.85
}

# -----------------------------
# TIME
# -----------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 180
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, 180
    halign = center
    valign = center
}

# -----------------------------
# DATE
# -----------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%B %d %Y")"
    color = rgba(200, 200, 200, 0.8)
    font_size = 40
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, 20
    halign = center
    valign = center
}

# -----------------------------
# DAY
# -----------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A")"
    color = rgba(180, 180, 180, 0.7)
    font_size = 36
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -50
    halign = center
    valign = center
}

# -----------------------------
# GENERAL
# -----------------------------
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# -----------------------------
# GREETING
# -----------------------------
label {
    monitor =
    text = cmd[update:60000] echo "Good $(date +%H | awk '{if ($1 < 10) print "morning"; else if ($1 < 13) print "noon"; else if ($1 < 18) print "afternoon"; else if ($1 < 22) print "evening"; else print "night"}')"
    color = rgba(220, 220, 220, 0.8)
    font_size = 28
    font_family = JetBrains Mono Nerd Font Mono
    position = 0, 340
    halign = center
    valign = center
}

# -----------------------------
# INPUT FIELD
# -----------------------------
input-field {
    monitor =
    size = 220, 50
    outline_thickness = 2

    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 0.9)

    placeholder_text = Password
    hide_input = true

    rounding = 10

    fail_color = rgba(255, 80, 80, 1.0)
    fail_text = Incorrect Password

    position = 0, -140
    halign = center
    valign = center
}
